<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auftrag</title>
<style>
@page{size:A4 portrait;margin:8mm}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:Arial,Helvetica,sans-serif;color:#222;font-size:9.5pt;line-height:1.35}
body{background:#f0f0f0;padding:20px}
.no-print{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:99}
.no-print button{padding:8px 14px;border:0;border-radius:6px;cursor:pointer;font-weight:600;font-size:11pt}
.btn-print{background:#0090c4;color:#fff}
.btn-close{background:#fff;color:#222;border:1px solid #ccc !important}
.page{max-width:194mm;margin:0 auto;background:#fff;padding:8mm 10mm;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #0090c4;padding-bottom:6px;margin-bottom:6px}
.hdr .logo{height:52px}
.hdr h1{font-size:16pt;color:#0090c4;font-weight:800;letter-spacing:1.5px}
.hdr .meta{text-align:right;font-size:8.5pt}
.hdr .meta .nr{font-weight:700;color:#0090c4;font-size:10pt}
.notice{background:#fff8e1;border-left:3px solid #f59e0b;padding:4px 8px;font-size:8pt;margin-bottom:6px}
.notice.vk{background:#dcfce7;border-color:#15803d}
.notice.bs{background:#fef3c7;border-color:#a16207}
.notice.fw{background:#ede9fe;border-color:#6d28d9}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.sec{margin-bottom:6px}
.sec-t{background:#0090c4;color:#fff;padding:2px 8px;font-size:8.5pt;font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:inline-block;border-radius:2px;margin-bottom:3px}
.sec-t.vk{background:#15803d}
.sec-t.bs{background:#a16207}
.sec-t.fw{background:#6d28d9}
.f{margin-bottom:3px}
.f .lbl{font-size:7.5pt;color:#666;text-transform:uppercase;letter-spacing:.3px}
.f .val{font-size:9pt;font-weight:600;border-bottom:1px solid #0090c4;padding-bottom:1px;min-height:13px;color:#1a1a2e}
.cb{display:inline-block;background:#e8f5fc;color:#0090c4;padding:2px 8px;border-radius:10px;font-size:8pt;font-weight:600;margin:1px 2px 1px 0}
.box{background:#e8f5fc;padding:6px 8px;border-radius:3px;font-size:8.5pt}
.box.vk{background:#dcfce7}
.box.bs{background:#fef3c7}
.box.fw{background:#ede9fe}
.stars{font-size:11pt;color:#f59e0b;letter-spacing:1px}
.agb{background:#e8f5fc;border-left:3px solid #0090c4;padding:4px 8px;font-size:8.5pt;margin:4px 0}
.sig{margin-top:6px;padding-top:4px;border-top:1px dashed #ccc}
.sig-row{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:18px}
.sig-box{text-align:center}
.sig-line{border-bottom:1px solid #000;margin-bottom:2px}
.sig-lbl{font-size:7.5pt;color:#666}
.foot{background:#0090c4;color:#fff;padding:4px 10px;font-size:7.5pt;display:flex;justify-content:space-between;margin-top:6px;border-radius:2px}
.foot.vk{background:#15803d}
.foot.bs{background:#a16207}
.foot.fw{background:#6d28d9}
@media print{
  html,body{background:#fff;padding:0;margin:0}
  .no-print{display:none}
  .page{box-shadow:none;max-width:none;width:100%;padding:0;margin:0}
}
</style>
</head>
<body>
<div class="no-print">
  <button class="btn-close" onclick="window.close()">✕ Schließen</button>
  <button class="btn-print" onclick="window.print()">🖨 Drucken</button>
</div>
<div id="root">Lade...</div>
<script>
var W='https://hasi-reparatur.hguencavdi.workers.dev';
var A='Bearer 71665';
var LOGO='https://tools.hasi-elektronic.de/logo.jpg';

function fmtD(s){if(!s)return'';var p=(s||'').slice(0,10).split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0]:s;}
function stars(n){var s='';for(var i=1;i<=5;i++)s+=(i<=(n||0)?'★':'☆');return s;}
function cb(t){return '<span class="cb">'+t.trim()+'</span>';}

// Notlardan ekstra bilgileri parse et (Lieferant, Preis, Garantie, SN vb.)
function parseExtra(beschreibung){
  var out = {};
  if(!beschreibung) return out;
  // " | " ile ayrılmış key:value parçaları
  var parts = beschreibung.split('|');
  parts.forEach(function(p){
    var m = p.match(/(Lieferant|Lieferdatum|Preis|Garantie|SN|Kontaktart|Anliegen|Dauer ca\.):\s*(.+)/i);
    if(m) out[m[1].toLowerCase()] = m[2].trim();
  });
  return out;
}

function render(r){
  var typ = r.auftragstyp || 'reparatur';
  var NR = r.nr || '';
  var TITLE = typ === 'verkauf' ? 'VERKAUFSBELEG' : typ === 'bestellung' ? 'BESTELLUNG' : typ === 'fernwartung' ? 'FERNWARTUNGS-AUFTRAG' : 'REPARATURAUFTRAG';
  var CSS_CLASS = typ === 'verkauf' ? 'vk' : typ === 'bestellung' ? 'bs' : typ === 'fernwartung' ? 'fw' : '';
  var NOTICE_TXT = typ === 'verkauf'
    ? 'Verkaufsbeleg / Lieferschein für neues Gerät. Mit Unterschrift bestätigt der Auftraggeber den Empfang.'
    : typ === 'bestellung'
    ? 'Bestellung — Lieferung erwartet. Status wird nach Eintreffen der Ware aktualisiert.'
    : typ === 'fernwartung'
    ? 'Fernwartung oder telefonische/persönliche Beratung. Abrechnung nach Erledigung gemäß Arbeitsbericht.'
    : 'Bitte füllen Sie das Formular leserlich aus. Die Rechnung wird auf den angegebenen Namen ausgestellt.';

  document.title = TITLE + ' ' + NR;
  var extra = parseExtra(r.beschreibung);
  var headerColor = typ === 'verkauf' ? '#15803d' : typ === 'bestellung' ? '#a16207' : typ === 'fernwartung' ? '#6d28d9' : '#0090c4';

  // Sağ sütun — tipe göre değişir
  var rightCol = '';
  if(typ === 'verkauf'){
    rightCol =
      '<div class="sec">'+
        '<div class="sec-t vk">Verkaufsdetails</div>'+
        '<div class="f"><div class="lbl">Preis</div><div class="val">'+(extra.preis||r.kostenlimit||'—')+'</div></div>'+
        '<div class="f"><div class="lbl">Garantie</div><div class="val">'+(extra.garantie||'—')+'</div></div>'+
        '<div class="f"><div class="lbl">Seriennummer</div><div class="val">'+(extra.sn||'—')+'</div></div>'+
      '</div>';
  } else if(typ === 'bestellung'){
    rightCol =
      '<div class="sec">'+
        '<div class="sec-t bs">Bestelldetails</div>'+
        '<div class="f"><div class="lbl">Lieferant</div><div class="val">'+(extra.lieferant||'—')+'</div></div>'+
        '<div class="f"><div class="lbl">Erwartetes Lieferdatum</div><div class="val">'+(extra.lieferdatum?fmtD(extra.lieferdatum):'—')+'</div></div>'+
        '<div class="f"><div class="lbl">Bestellpreis</div><div class="val">'+(extra.preis||'—')+'</div></div>'+
      '</div>';
  } else if(typ === 'fernwartung'){
    rightCol =
      '<div class="sec">'+
        '<div class="sec-t fw">Fernwartung / Anruf</div>'+
        '<div class="f"><div class="lbl">Kontaktart</div><div class="val">'+(extra.kontaktart||'—')+'</div></div>'+
        '<div class="f"><div class="lbl">Anliegen</div><div class="val">'+(extra.anliegen||(r.beschreibung||'').split('|')[0].trim()||'—')+'</div></div>'+
        '<div class="f"><div class="lbl">Geschätzte Dauer</div><div class="val">'+(extra['dauer ca.']||'—')+'</div></div>'+
      '</div>';
  } else {
    rightCol =
      '<div class="sec">'+
        '<div class="sec-t">Kostenlimit / Schäden</div>'+
        '<div class="f"><div class="lbl">Maximaler Betrag</div><div class="val">'+(r.kostenlimit?r.kostenlimit+' €':'—')+'</div></div>'+
        (r.schaeden?'<div class="f"><div class="lbl">Sichtbare Schäden</div><div class="val">'+r.schaeden+'</div></div>':'')+
      '</div>';
  }

  // Geräte sol sütun
  var leftDevice = '';
  if(typ === 'reparatur'){
    leftDevice =
      '<div class="f"><div class="lbl">Geräte-Typ</div><div class="val">'+(r.geraet_typ||'')+'</div></div>'+
      '<div class="f"><div class="lbl">Modell</div><div class="val">'+(r.modell||'')+'</div></div>'+
      (r.win_passwort?'<div class="f"><div class="lbl" style="color:#d97706">Windows Passwort</div><div class="val" style="border-color:#d97706">'+r.win_passwort+'</div></div>':'')+
      '<div class="f"><div class="lbl">Allg. Zustand</div><div class="stars">'+stars(r.zustand)+'</div></div>';
  } else {
    leftDevice =
      '<div class="f"><div class="lbl">Geräte-Typ</div><div class="val">'+(r.geraet_typ||'')+'</div></div>'+
      '<div class="f"><div class="lbl">Modell</div><div class="val">'+(r.modell||'')+'</div></div>';
  }

  // Zubehör + Fehler — sadece reparatur
  var zubehoer = '';
  var fehler = '';
  if(typ === 'reparatur'){
    var zub = r.zubehoer ? r.zubehoer.split(',').filter(function(s){return s.trim();}) : [];
    var feh = r.fehler ? r.fehler.split(',').filter(function(s){return s.trim();}) : [];
    if(zub.length) zubehoer = '<div class="sec"><div class="sec-t">Beigelegtes Zubehör</div><div>'+zub.map(cb).join('')+'</div></div>';
    if(feh.length) fehler = '<div class="sec"><div class="sec-t">Fehlerbeschreibung</div><div>'+feh.map(cb).join('')+'</div></div>';
  }

  // Beschreibung — extra key:value'ları çıkar, sadece serbest metin kalır
  var freeBesch = (r.beschreibung || '').split('|')[0].trim();

  // Auftragstyp etiketi (sol üst)
  var typBadge = typ === 'verkauf'
    ? '<span style="display:inline-block;background:#dcfce7;color:#15803d;padding:3px 10px;border-radius:6px;font-size:8.5pt;font-weight:700;margin-right:6px">📦 VERKAUF</span>'
    : typ === 'bestellung'
    ? '<span style="display:inline-block;background:#fef3c7;color:#a16207;padding:3px 10px;border-radius:6px;font-size:8.5pt;font-weight:700;margin-right:6px">🛒 BESTELLUNG</span>'
    : typ === 'fernwartung'
    ? '<span style="display:inline-block;background:#ede9fe;color:#6d28d9;padding:3px 10px;border-radius:6px;font-size:8.5pt;font-weight:700;margin-right:6px">📞 FERNWARTUNG</span>'
    : '<span style="display:inline-block;background:#dbeafe;color:#1e40af;padding:3px 10px;border-radius:6px;font-size:8.5pt;font-weight:700;margin-right:6px">🔧 REPARATUR</span>';

  // Header border + sec-t renkleri dynamic
  var headerStyle = 'border-color:'+headerColor;
  var titleStyle = 'color:'+headerColor;
  var nrStyle = 'color:'+headerColor;

  document.getElementById('root').innerHTML =
    '<div class="page">'+
      '<style>.page .hdr{border-color:'+headerColor+'!important}.page .hdr h1,.page .hdr .meta .nr{color:'+headerColor+'!important}</style>'+
      '<div class="hdr">'+
        '<img class="logo" src="'+LOGO+'" alt="Hasi" onerror="this.style.display=\'none\'">'+
        '<div style="flex:1;text-align:center"><h1>'+TITLE+'</h1></div>'+
        '<div class="meta"><div class="nr">'+NR+'</div><div>Datum: '+fmtD(r.datum)+'</div></div>'+
      '</div>'+
      '<div style="margin-bottom:6px">'+typBadge+'</div>'+
      '<div class="notice '+CSS_CLASS+'">'+NOTICE_TXT+'</div>'+
      '<div class="cols">'+
        '<div class="sec">'+
          '<div class="sec-t '+CSS_CLASS+'">Auftragnehmer</div>'+
          '<div class="box '+CSS_CLASS+'"><b>Hasi Elektronic</b><br>Graßenstraße 18 · 71665 Vaihingen/Enz<br>Tel: +49 7042 163914<br>info@hasi-elektronic.de</div>'+
        '</div>'+
        '<div class="sec">'+
          '<div class="sec-t '+CSS_CLASS+'">'+(typ==='verkauf'?'Käufer':typ==='bestellung'?'Auftraggeber':'Auftraggeber')+'</div>'+
          '<div class="f"><div class="lbl">Name</div><div class="val">'+(r.k_name||'')+'</div></div>'+
          '<div class="f"><div class="lbl">Adresse</div><div class="val">'+(r.k_adresse||'')+'</div></div>'+
          '<div class="f"><div class="lbl">PLZ / Ort</div><div class="val">'+(r.k_plz_ort||'')+'</div></div>'+
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'+
            '<div class="f"><div class="lbl">Telefon</div><div class="val">'+(r.k_telefon||'')+'</div></div>'+
            '<div class="f"><div class="lbl">E-Mail</div><div class="val">'+(r.k_email||'')+'</div></div>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="cols">'+
        '<div class="sec">'+
          '<div class="sec-t '+CSS_CLASS+'">Geräteinformation</div>'+
          leftDevice+
        '</div>'+
        rightCol+
      '</div>'+
      zubehoer+
      fehler+
      (freeBesch?'<div class="sec"><div class="sec-t '+CSS_CLASS+'">Weitere Beschreibung</div><div class="box '+CSS_CLASS+'">'+freeBesch+'</div></div>':'')+
      '<div class="agb">☑ Ich akzeptiere die <b>AGB der Hasi Elektronic</b> — www.hasi-elektronic.de</div>'+
      '<div class="sig">'+
        '<div style="font-size:9pt;font-weight:700">'+(typ==='verkauf'?'Empfangsbestätigung':typ==='bestellung'?'Bestellbestätigung':typ==='fernwartung'?'Auftragsbestätigung für Fernwartung/Anruf':'Bestätigung der Geräteübergabe')+'</div>'+
        '<div class="sig-row">'+
          '<div class="sig-box"><div class="sig-line"></div><div class="sig-lbl">Ort, Datum</div></div>'+
          '<div class="sig-box"><div class="sig-line"></div><div class="sig-lbl">Unterschrift '+(typ==='verkauf'?'Käufer':'Auftraggeber')+'</div></div>'+
        '</div>'+
      '</div>'+
      '<div class="foot '+CSS_CLASS+'"><span>Hasi Elektronic · Graßenstraße 18 · 71665 Vaihingen/Enz · +49 7042 163914</span><span>'+NR+'</span></div>'+
    '</div>';
}

var id = new URLSearchParams(window.location.search).get('id');
if(id){
  fetch(W+'/api/reparatur/'+id,{headers:{Authorization:A}}).then(function(r){return r.json();}).then(function(r){
    if(r.error) document.getElementById('root').innerHTML='<div style="color:red;padding:20px">'+r.error+'</div>';
    else render(r);
  }).catch(function(e){document.getElementById('root').innerHTML='<div style="color:red;padding:20px">'+e.message+'</div>';});
} else {
  document.getElementById('root').innerHTML='<div style="color:red;padding:20px">Kein Auftrag angegeben.</div>';
}
</script>
</body>
</html>
