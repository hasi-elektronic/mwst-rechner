<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Geräte-Etikett</title>
<style>
/* Brother QL-1110 · DK-2243 Endlos 102mm · Etikettenlänge 60mm */
@page{size:102mm 60mm;margin:0}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:Arial,Helvetica,sans-serif;color:#111}
body{background:#e9eef2;padding:18px;display:flex;flex-direction:column;align-items:center;gap:14px}

.no-print{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:99}
.no-print button{padding:8px 14px;border:0;border-radius:6px;cursor:pointer;font-weight:600;font-size:11pt}
.btn-print{background:#33afe2;color:#fff}
.btn-close{background:#fff;color:#222;border:1px solid #ccc !important}
.hint{position:fixed;top:54px;right:10px;background:#fff;border:1px solid #d8e0e6;border-radius:6px;padding:6px 10px;font-size:8.5pt;color:#5a6b78;max-width:240px;z-index:99}

/* ---- Etikett: 102 x 60 mm ---- */
.label{
  width:102mm;height:60mm;background:#fff;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}
.lab-hd{
  display:flex;align-items:center;gap:8px;
  height:12mm;padding:0 4mm;border-bottom:2px solid #33afe2;flex:0 0 auto;
}
.lab-hd img{height:8mm;width:auto}
.lab-hd .brand{font-size:9pt;font-weight:800;letter-spacing:.5px;color:#33afe2}
.lab-hd .brand small{display:block;font-size:6.5pt;font-weight:600;font-style:italic;color:#5a6b78;letter-spacing:.3px}
.lab-hd .typbadge{margin-left:auto;font-size:7.5pt;font-weight:700;color:#0b5e7d;background:#33afe21f;border:1px solid #33afe255;padding:2px 7px;border-radius:10px;white-space:nowrap}

.lab-bd{flex:1 1 auto;display:flex;padding:2.5mm 4mm 1mm;gap:4mm;min-height:0}
.bd-left{flex:1 1 auto;min-width:0;display:flex;flex-direction:column}
.modell{font-size:13pt;font-weight:800;line-height:1.05;color:#111;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.specs{margin-top:1.5mm;font-size:8.5pt;line-height:1.45;color:#333}
.specs .s{display:flex;gap:5px}
.specs .s b{color:#555;font-weight:600;min-width:11mm;display:inline-block}
.bd-right{flex:0 0 30mm;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;text-align:right}
.preis{font-size:21pt;font-weight:800;color:#33afe2;line-height:1;white-space:nowrap}
.preis-sub{font-size:6.5pt;color:#777;margin-top:1px}
.garantie{margin-top:auto;font-size:7.5pt;color:#0b5e7d;font-weight:700;background:#33afe214;border-radius:5px;padding:2px 6px;white-space:nowrap}

.lab-ft{flex:0 0 auto;padding:0 4mm 2mm;display:flex;flex-direction:column;align-items:center}
.barcode{width:100%;height:auto;max-height:13mm;display:block}
.sn-text{font-size:8pt;font-family:'DM Mono',Consolas,monospace;letter-spacing:.5px;color:#222;margin-top:-1mm}
.sn-fallback{font-size:11pt;font-weight:700;font-family:Consolas,monospace;letter-spacing:1px;padding:2mm 0}

#loading{padding:40px;color:#888;font-size:11pt}

@media print{
  body{background:#fff;padding:0;gap:0}
  .no-print,.hint{display:none}
  .label{box-shadow:none;page-break-after:always}
  .label:last-child{page-break-after:auto}
}
</style>
</head>
<body>
<div class="no-print">
  <button class="btn-print" onclick="window.print()">🖨 Drucken</button>
  <button class="btn-close" onclick="window.close()">Schließen</button>
</div>
<div class="hint">Drucker: <b>Brother QL-1110</b><br>Papier: DK-2243 (102 mm endlos)<br>Etikettenlänge: <b>60 mm</b></div>

<div id="stage"><div id="loading">Lade Etikett…</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script>
var W='https://hasi-reparatur.hguencavdi.workers.dev';
var A='Bearer '+(new URLSearchParams(location.search).get('t')||localStorage.getItem('hasi_tok')||'');

function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtPreis(n){
  n=Number(n)||0;
  if(n%1===0) return n.toLocaleString('de-DE')+' €';
  return n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
}

function specRow(label,val){
  if(!val) return '';
  return '<div class="s"><b>'+label+'</b><span>'+esc(val)+'</span></div>';
}

function labelHtml(g, showPreis){
  var brutto=Number(g.verkaufspreis)||0;
  var modell=esc(g.modell||g.geraet_typ||'Gerät');
  var typ=esc(g.geraet_typ||'');
  var sn=(g.seriennummer||'').toString().trim();

  // Specs: SSD+GPU tek satırda birleştir (yer tasarrufu)
  var spd=[g.ssd,g.gpu].filter(Boolean).join(' · ');
  var specs=
      specRow('CPU', g.cpu)
    + specRow('RAM', g.ram)
    + specRow('Disk', spd)
    + specRow('Sonst.', g.spezifikationen)
    + specRow('Zubeh.', g.zubehoer);

  var preisBox='';
  if(showPreis && brutto>0){
    preisBox =
      '<div class="preis">'+fmtPreis(brutto)+'</div>'
     +'<div class="preis-sub">inkl. 19% MwSt</div>';
  }
  var gar='';
  if(g.garantie_monate){
    gar='<div class="garantie">🛡 '+esc(g.garantie_monate)+' Mon. Garantie</div>';
  }

  // Barkod / SN alanı
  var snId='bc-'+(g.id||Math.random().toString(36).slice(2));
  var footer = sn
    ? '<svg class="barcode" id="'+snId+'" data-sn="'+esc(sn)+'"></svg><div class="sn-text">SN: '+esc(sn)+'</div>'
    : '<div class="sn-fallback">'+esc(g.modell||g.geraet_typ||'—')+'</div>';

  return ''
  +'<div class="label">'
    +'<div class="lab-hd">'
      +'<img src="logo.jpg" alt="Hasi" onerror="this.style.display=\'none\'">'
      +'<div class="brand">HASI<small>elektronic</small></div>'
      +(typ?'<div class="typbadge">'+typ+'</div>':'')
    +'</div>'
    +'<div class="lab-bd">'
      +'<div class="bd-left">'
        +'<div class="modell">'+modell+'</div>'
        +'<div class="specs">'+specs+'</div>'
      +'</div>'
      +'<div class="bd-right">'+preisBox+gar+'</div>'
    +'</div>'
    +'<div class="lab-ft">'+footer+'</div>'
  +'</div>';
}

function drawBarcodes(){
  if(typeof JsBarcode==='undefined') return; // CDN yüklenmediyse SN text yine görünür (svg boş kalır)
  document.querySelectorAll('svg.barcode').forEach(function(svg){
    var sn=svg.getAttribute('data-sn');
    if(!sn) return;
    try{
      JsBarcode(svg, sn, {format:'CODE128', width:1.6, height:42, displayValue:false, margin:0});
    }catch(e){ /* geçersiz karakter vs. -> SN text yeterli */ }
  });
}

async function fetchGeraet(id){
  var r=await fetch(W+'/api/geraete/'+id,{headers:{Authorization:A}});
  return await r.json();
}

async function load(){
  var p=new URLSearchParams(location.search);
  var showPreis = p.get('preis')!=='0';   // ?preis=0 -> fiyatsız (iç envanter)
  var ids=[];
  if(p.get('ids')) ids=p.get('ids').split(',').map(function(x){return x.trim();}).filter(Boolean);
  else if(p.get('id')) ids=[p.get('id')];

  if(!ids.length){
    document.getElementById('stage').innerHTML='<div id="loading">Keine Geräte-ID angegeben.</div>';
    return;
  }
  try{
    var geraete=await Promise.all(ids.map(fetchGeraet));
    var html='';
    geraete.forEach(function(g){
      if(g && !g.error) html+=labelHtml(g, showPreis);
    });
    if(!html){
      document.getElementById('stage').innerHTML='<div id="loading">Gerät(e) nicht gefunden.</div>';
      return;
    }
    document.getElementById('stage').innerHTML=html;
    drawBarcodes();
    if(p.get('print')==='1') setTimeout(function(){window.print();}, 300);
  }catch(e){
    document.getElementById('stage').innerHTML='<div id="loading">Fehler: '+esc(e.message)+'</div>';
  }
}
load();
</script>
</body>
</html>
