<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MwSt & Kalkulations-Rechner — Hasi Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen">

  <div class="max-w-4xl mx-auto p-4 pb-8">

    <div class="mb-4">
      <a href="./index.html" style="color:#33afe2;font-size:13px;text-decoration:none;">← Hasi Tools</a>
    </div>

    <!-- Header -->
    <div class="bg-gradient-to-r from-cyan-500 to-blue-600 rounded-t-2xl shadow-lg p-6 text-white">
      <div class="flex items-center justify-between flex-wrap gap-4">
        <div class="flex items-center gap-3">
          <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <div>
            <h1 class="text-2xl font-bold">MwSt & Kalkulations-Rechner</h1>
            <p class="text-sm text-blue-100">Hasi Elektronic</p>
          </div>
        </div>
        <button id="btn-calc" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
          </svg>
          <span class="hidden sm:inline">Rechner</span>
        </button>
      </div>
    </div>

    <div class="bg-white rounded-b-2xl shadow-lg p-6 space-y-6">

      <!-- Kalkulation -->
      <div class="border border-gray-200 rounded-xl p-6 bg-gradient-to-br from-gray-50 to-white">
        <h2 class="text-lg font-bold text-gray-800 mb-4">Kalkulation Verkaufspreis</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="text-sm text-gray-600 mb-1 block">Einkaufspreis Netto (€)</label>
            <input id="einkauf" type="text" inputmode="decimal"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="0,00">
          </div>
          <div>
            <label class="text-sm text-gray-600 mb-1 block">Aufschlag (%)</label>
            <input id="aufschlag" type="text" inputmode="decimal"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="0">
          </div>
        </div>
        <button id="btn-vk" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition mb-4">
          Berechnen
        </button>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div id="res-vk-netto" class="bg-green-50 border border-green-200 rounded-lg p-4 cursor-pointer hover:bg-green-100 transition">
            <div class="text-sm text-green-700">VK Netto</div>
            <div class="text-2xl font-bold text-green-800">0,00 €</div>
          </div>
          <div id="res-vk-brutto" class="bg-blue-50 border border-blue-200 rounded-lg p-4 cursor-pointer hover:bg-blue-100 transition">
            <div class="text-sm text-blue-700">VK Brutto</div>
            <div class="text-2xl font-bold text-blue-800">0,00 €</div>
          </div>
        </div>
      </div>

      <!-- Netto → Brutto -->
      <div class="border border-gray-200 rounded-xl p-6 bg-gradient-to-br from-gray-50 to-white">
        <h2 class="text-lg font-bold text-gray-800 mb-4">Netto → Brutto (19% MwSt)</h2>
        <div class="flex gap-4 mb-4 flex-wrap">
          <input id="netto-in" type="text" inputmode="decimal"
            class="flex-1 min-w-[200px] px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Netto-Preis">
          <button id="btn-nb" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition">→ Berechnen</button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div id="res-brutto" class="bg-blue-50 border border-blue-200 rounded-lg p-4 cursor-pointer hover:bg-blue-100 transition">
            <div class="text-sm text-blue-700">Brutto-Preis</div>
            <div class="text-xl font-bold text-blue-800">0,00 €</div>
          </div>
          <div id="res-mwst-n" class="bg-orange-50 border border-orange-200 rounded-lg p-4 cursor-pointer hover:bg-orange-100 transition">
            <div class="text-sm text-orange-700">MwSt. (19%)</div>
            <div class="text-xl font-bold text-orange-800">0,00 €</div>
          </div>
        </div>
      </div>

      <!-- Brutto → Netto -->
      <div class="border border-gray-200 rounded-xl p-6 bg-gradient-to-br from-gray-50 to-white">
        <h2 class="text-lg font-bold text-gray-800 mb-4">Brutto → Netto (19% MwSt)</h2>
        <div class="flex gap-4 mb-4 flex-wrap">
          <input id="brutto-in" type="text" inputmode="decimal"
            class="flex-1 min-w-[200px] px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" placeholder="Brutto-Preis">
          <button id="btn-bn" class="bg-purple-500 hover:bg-purple-600 text-white px-6 py-2 rounded-lg transition">→ Berechnen</button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div id="res-netto" class="bg-purple-50 border border-purple-200 rounded-lg p-4 cursor-pointer hover:bg-purple-100 transition">
            <div class="text-sm text-purple-700">Netto-Preis</div>
            <div class="text-xl font-bold text-purple-800">0,00 €</div>
          </div>
          <div id="res-mwst-b" class="bg-orange-50 border border-orange-200 rounded-lg p-4 cursor-pointer hover:bg-orange-100 transition">
            <div class="text-sm text-orange-700">MwSt.-Anteil (19%)</div>
            <div class="text-xl font-bold text-orange-800">0,00 €</div>
          </div>
        </div>
      </div>

      <!-- Status -->
      <div class="bg-gray-800 text-gray-100 px-4 py-2 rounded-lg flex justify-between items-center flex-wrap gap-2">
        <span id="status-msg" class="text-blue-400">Bereit</span>
        <span class="text-gray-400 text-sm">MwSt: 19%</span>
      </div>

    </div>
  </div>

  <!-- Calculator Modal -->
  <div id="calc-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-gray-800 rounded-2xl p-6 w-full max-w-sm">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-white font-bold text-lg">Taschenrechner</h3>
        <button id="calc-close" class="text-white hover:text-gray-300 text-xl">✕</button>
      </div>
      <input id="calc-display" type="text" readonly
        class="w-full bg-gray-700 text-white text-right text-2xl px-4 py-3 rounded-lg mb-4 font-mono">
      <div class="grid grid-cols-4 gap-2">
        <button class="calc-btn bg-red-600    hover:bg-red-700    text-white font-bold py-4 rounded-lg" data-val="C">C</button>
        <button class="calc-btn bg-red-600    hover:bg-red-700    text-white font-bold py-4 rounded-lg" data-val="←">←</button>
        <button class="calc-btn bg-blue-600   hover:bg-blue-700   text-white font-bold py-4 rounded-lg" data-val="%">%</button>
        <button class="calc-btn bg-blue-600   hover:bg-blue-700   text-white font-bold py-4 rounded-lg" data-val="/">/</button>
        <button class="calc-btn bg-gray-600   hover:bg-gray-500   text-white font-bold py-4 rounded-lg" data-val="7">7</button>
        <button class="calc-btn bg-gray-600   hover:bg-gray-500   text-white font-bold py-4 rounded-lg" data-val="8">8</button>
        <button class="calc-btn bg-gray-600   hover:bg-gray-500   text-white font-bold py-4 rounded-lg" data-val="9">9</button>
        <button class="calc-btn bg-blue-600   hover:bg-blue-700   text-white font-bold py-4 rounded-lg" data-val="*">×</button>
        <button class="calc-btn bg-gray-600   hover:bg-gray-500   text-white font-bold py-4 rounded-lg" data-val="4">4</button>
        <button class="calc-btn bg-gray-600   hover:bg-gray-500   text-white font-bold py-4 rounded-lg" data-val="5">5</button>
        <button class="calc-btn bg-gray-600   hover:bg-gray-500   text-white font-bold py-4 rounded-lg" data-val="6">6</button>
        <button class="calc-btn bg-blue-600   hover:bg-blue-700   text-white font-bold py-4 rounded-lg" data-val="-">−</button>
        <button class="calc-btn bg-gray-600   hover:bg-gray-500   text-white font-bold py-4 rounded-lg" data-val="1">1</button>
        <button class="calc-btn bg-gray-600   hover:bg-gray-500   text-white font-bold py-4 rounded-lg" data-val="2">2</button>
        <button class="calc-btn bg-gray-600   hover:bg-gray-500   text-white font-bold py-4 rounded-lg" data-val="3">3</button>
        <button class="calc-btn bg-blue-600   hover:bg-blue-700   text-white font-bold py-4 rounded-lg" data-val="+">+</button>
        <button class="calc-btn bg-gray-600   hover:bg-gray-500   text-white font-bold py-4 rounded-lg col-span-2" data-val="0">0</button>
        <button class="calc-btn bg-gray-600   hover:bg-gray-500   text-white font-bold py-4 rounded-lg" data-val=".">.</button>
        <button class="calc-btn bg-green-600  hover:bg-green-700  text-white font-bold py-4 rounded-lg" data-val="=">=</button>
      </div>
    </div>
  </div>

  <script>
    const MWST = 0.19;

    function fmt(v) {
      return v.toFixed(2).replace('.', ',') + ' €';
    }

    function parse(v) {
      return parseFloat((v || '').replace(',', '.').replace(/[^\d.]/g, '')) || 0;
    }

    function setResult(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.querySelector('div:last-child').textContent = value;
    }

    function setStatus(msg, color) {
      const el = document.getElementById('status-msg');
      el.textContent = msg;
      el.className = color || 'text-blue-400';
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.textContent = 'Bereit'; el.className = 'text-blue-400'; }, 3000);
    }

    function copyVal(id) {
      const el = document.getElementById(id);
      const txt = el.querySelector('div:last-child').textContent;
      const clean = txt.replace(' €', '').replace(/\./g, '').replace(',', '.');
      navigator.clipboard.writeText(clean).catch(() => {});
      setStatus('✓ Kopiert: ' + txt, 'text-green-400');
    }

    // Kalkulation
    document.getElementById('btn-vk').addEventListener('click', () => {
      const ek = parse(document.getElementById('einkauf').value);
      const auf = parse(document.getElementById('aufschlag').value);
      if (ek <= 0) { setStatus('⚠️ Einkaufspreis > 0', 'text-orange-400'); return; }
      const vkN = ek * (1 + auf / 100);
      const vkB = vkN * (1 + MWST);
      setResult('res-vk-netto',  fmt(vkN));
      setResult('res-vk-brutto', fmt(vkB));
      setStatus('✓ Berechnet: ' + auf.toFixed(1) + '% Aufschlag', 'text-green-400');
    });

    document.getElementById('aufschlag').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-vk').click();
    });

    // VK → übernehmen
    document.getElementById('res-vk-netto').addEventListener('click', () => {
      const val = document.getElementById('res-vk-netto').querySelector('div:last-child').textContent.replace(' €','');
      document.getElementById('netto-in').value = val;
      document.getElementById('btn-nb').click();
    });
    document.getElementById('res-vk-brutto').addEventListener('click', () => {
      const val = document.getElementById('res-vk-brutto').querySelector('div:last-child').textContent.replace(' €','');
      document.getElementById('brutto-in').value = val;
      document.getElementById('btn-bn').click();
    });

    // Netto → Brutto
    document.getElementById('btn-nb').addEventListener('click', () => {
      const n = parse(document.getElementById('netto-in').value);
      if (n <= 0) { setStatus('⚠️ Netto > 0', 'text-orange-400'); return; }
      const b = n * (1 + MWST);
      setResult('res-brutto', fmt(b));
      setResult('res-mwst-n', fmt(b - n));
      setStatus('✓ Brutto berechnet', 'text-green-400');
    });
    document.getElementById('netto-in').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-nb').click();
    });
    document.getElementById('res-brutto').addEventListener('click', () => copyVal('res-brutto'));
    document.getElementById('res-mwst-n').addEventListener('click', () => copyVal('res-mwst-n'));

    // Brutto → Netto
    document.getElementById('btn-bn').addEventListener('click', () => {
      const b = parse(document.getElementById('brutto-in').value);
      if (b <= 0) { setStatus('⚠️ Brutto > 0', 'text-orange-400'); return; }
      const n = b / (1 + MWST);
      setResult('res-netto',  fmt(n));
      setResult('res-mwst-b', fmt(b - n));
      setStatus('✓ Netto berechnet', 'text-green-400');
    });
    document.getElementById('brutto-in').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-bn').click();
    });
    document.getElementById('res-netto').addEventListener('click',  () => copyVal('res-netto'));
    document.getElementById('res-mwst-b').addEventListener('click', () => copyVal('res-mwst-b'));

    // Calculator modal
    const modal   = document.getElementById('calc-modal');
    const display = document.getElementById('calc-display');

    document.getElementById('btn-calc').addEventListener('click', () => modal.classList.remove('hidden'));
    document.getElementById('calc-close').addEventListener('click', () => modal.classList.add('hidden'));
    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.add('hidden'); });

    document.querySelectorAll('.calc-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = btn.dataset.val;
        if (v === 'C')  { display.value = ''; return; }
        if (v === '←')  { display.value = display.value.slice(0, -1); return; }
        if (v === '=')  {
          try { display.value = eval(display.value.replace(',','.')); }
          catch { display.value = 'Fehler'; }
          return;
        }
        display.value += v;
      });
    });
  </script>

</body>
</html>
