<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reparatur Admin</title>
<script>if(sessionStorage.getItem("hasi-auth")!=="1")window.location.href="./index.html";</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f12;--s:#151820;--b:#1e2330;--b2:#2a3040;--hasi:#33afe2;--t:#e8ecf0;--m:#6b7585;--green:#34d399;--amber:#fbbf24;--red:#f87171;--orange:#fb923c;--purple:#a78bfa;--blue:#60a5fa}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(var(--b) 1px,transparent 1px),linear-gradient(90deg,var(--b) 1px,transparent 1px);background-size:48px 48px;opacity:.4;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:20px 16px 60px}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--m);text-decoration:none;font-size:13px;font-family:"DM Mono",monospace;margin-bottom:20px;transition:color .2s}
.back:hover{color:var(--hasi)}
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.hdr h1{font-size:26px;font-weight:600;letter-spacing:-.8px}
.hdr h1 span{color:var(--hasi)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.stat{background:var(--s);border:1px solid var(--b2);border-radius:12px;padding:14px;text-align:center}
.stat .v{font-size:26px;font-weight:700}
.stat .l{font-size:10px;font-family:"DM Mono",monospace;color:var(--m);margin-top:3px}
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.fbtn{font-size:11px;font-family:"DM Mono",monospace;padding:5px 12px;border-radius:100px;cursor:pointer;border:1px solid var(--b2);color:var(--m);background:transparent;transition:all .15s}
.fbtn:hover,.fbtn.on{border-color:var(--hasi);color:var(--hasi);background:rgba(51,175,226,0.08)}
.tbl-wrap{background:var(--s);border:1px solid var(--b2);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:#0a0c0f;padding:10px 12px;text-align:left;font-size:10px;font-family:"DM Mono",monospace;color:var(--m);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--b2)}
tr.row{cursor:pointer;transition:background .15s}
tr.row:hover td{background:rgba(51,175,226,0.06)}
td{padding:12px;border-bottom:1px solid var(--b);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;font-size:10px;font-family:"DM Mono",monospace;padding:3px 9px;border-radius:100px;font-weight:500;white-space:nowrap}
.b-neu{background:rgba(51,175,226,0.15);color:var(--hasi)}
.b-bearbeitung{background:rgba(96,165,250,0.15);color:var(--blue)}
.b-teile{background:rgba(251,146,60,0.15);color:var(--orange)}
.b-warten{background:rgba(167,139,250,0.15);color:var(--purple)}
.b-fertig{background:rgba(52,211,153,0.15);color:var(--green)}
.b-abgeholt{background:rgba(107,117,133,0.2);color:var(--m)}
.b-abgelehnt{background:rgba(248,113,113,0.15);color:var(--red)}
#msg{text-align:center;padding:50px;color:var(--m);font-family:"DM Mono",monospace}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay.open{display:flex}
.mbox{background:#151820;border:1px solid var(--b2);border-radius:18px;width:100%;max-width:640px;margin:auto}
.mtop{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
.mtop h2{font-size:16px;font-weight:600}
.mclose{background:none;border:none;color:var(--m);font-size:22px;cursor:pointer;line-height:1}
.mclose:hover{color:var(--t)}
/* Info bölümü */
.minfo{padding:16px 24px;display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.mfield .lbl{font-size:9px;font-family:"DM Mono",monospace;color:var(--m);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px}
.mfield .val{font-size:12px;color:var(--t)}
/* Form bölümü */
.mform{padding:0 24px 24px;border-top:1px solid var(--b2);margin-top:12px;padding-top:16px}
.mform label{display:block;font-size:11px;color:var(--m);margin-bottom:4px;margin-top:12px}
.mform label:first-child{margin-top:0}
.mform select,.mform textarea{width:100%;background:#0d0f12;border:1px solid var(--b2);border-radius:8px;color:var(--t);padding:10px 12px;font-size:14px;font-family:"DM Sans",sans-serif;outline:none;transition:border-color .2s}
.mform select:focus,.mform textarea:focus{border-color:var(--hasi)}
.mform textarea{resize:vertical;min-height:70px}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.mbtn{padding:11px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-align:center}
.mbtn-save{background:var(--hasi);color:#fff}
.mbtn-save:hover{background:#1d8fbe}
.mbtn-pdf{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3)!important;color:var(--green);border:none}
.mbtn-pdf:hover{background:rgba(52,211,153,0.2)}
.mbtn-ab{grid-column:1/-1;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3)!important;color:var(--amber);border:none}
.mbtn-ab:hover{background:rgba(251,191,36,0.2)}
/* Calisan notiz banner */
.notiz-banner{background:rgba(51,175,226,0.08);border:1px solid rgba(51,175,226,0.2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--t);margin-top:8px;white-space:pre-wrap}
/* Print */
#print-area{display:none}
@media print{
  @page{size:A4;margin:8mm 10mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body>*{display:none!important}
  #print-area{display:block!important}
  .pd{font-family:"DM Sans",sans-serif;font-size:10px;color:#1a1a1a;line-height:1.5}
  .ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #33afe2}
  .ph img{height:38px}
  .phr{text-align:right;font-size:11px;color:#555}
  .phr strong{display:block;font-size:14px;color:#111;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px}
  .ps{margin-bottom:10px}
  .pst{font-size:9px;font-weight:700;color:#33afe2;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #e0e0e0}
  .pg{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px}
  .pf .pl{font-size:8px;font-weight:600;color:#888;text-transform:uppercase}
  .pf .pv{font-size:10px;border-bottom:1px solid #e0e0e0;padding-bottom:2px;min-height:15px}
  .pchk{display:flex;flex-wrap:wrap;gap:4px}
  .pc{font-size:9px;background:#f0f0f0;padding:2px 6px;border-radius:3px}
  .psig{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
  .psig-box{text-align:center}
  .psig-line{border-top:1px solid #333;padding-top:4px;font-size:9px;color:#888;margin-top:28px}
  .pfoot{margin-top:10px;padding-top:8px;border-top:1px solid #ddd;font-size:9px;color:#aaa;text-align:center}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="./index.html" class="back">← Hasi Tools</a>
  <div class="hdr">
    <h1>Reparatur<span>aufträge</span></h1>
    <button class="fbtn" id="btn-refresh" style="font-size:13px;padding:8px 16px">⟳ Aktualisieren</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="v" id="st" style="color:var(--hasi)">—</div><div class="l">Gesamt</div></div>
    <div class="stat"><div class="v" id="sn" style="color:var(--hasi)">—</div><div class="l">Neu</div></div>
    <div class="stat"><div class="v" id="sb" style="color:var(--blue)">—</div><div class="l">In Arbeit</div></div>
    <div class="stat"><div class="v" id="sf" style="color:var(--green)">—</div><div class="l">Fertig</div></div>
  </div>
  <div class="filters">
    <button class="fbtn on" data-f="all">Alle</button>
    <button class="fbtn" data-f="Neu">Neu</button>
    <button class="fbtn" data-f="In Bearbeitung">In Bearbeitung</button>
    <button class="fbtn" data-f="Teile bestellt">Teile bestellt</button>
    <button class="fbtn" data-f="Warten auf Kunde">Warten</button>
    <button class="fbtn" data-f="Fertig">Fertig</button>
    <button class="fbtn" data-f="Abgeholt">Abgeholt</button>
  </div>
  <div class="tbl-wrap">
    <div id="msg">Lade...</div>
    <table id="tbl" style="display:none">
      <thead><tr>
        <th>Nr.</th><th>Datum</th><th>Kunde</th><th>Gerät</th><th>Fehler</th><th>Limit</th><th>Status</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modal">
  <div class="mbox">
    <div class="mtop">
      <h2 id="m-nr">—</h2>
      <button class="mclose" id="m-close">✕</button>
    </div>
    <div class="minfo" id="m-info"></div>
    <div class="mform">
      <label>Status</label>
      <select id="m-status">
        <option>Neu</option>
        <option>In Bearbeitung</option>
        <option>Teile bestellt</option>
        <option>Warten auf Kunde</option>
        <option>Fertig</option>
        <option>Abgeholt</option>
        <option>Abgelehnt</option>
      </select>
      <label>Notizen (für Mitarbeiter sichtbar)</label>
      <textarea id="m-notiz" placeholder="z.B. Display bestellt, Lieferung Do. · Kunde informiert..."></textarea>
      <div class="mbtns">
        <button class="mbtn mbtn-save" id="m-save">💾 Speichern</button>
        <button class="mbtn mbtn-pdf" id="m-pdf">🖨 PDF</button>
        <button class="mbtn mbtn-ab" id="m-ab">📋 Arbeitsbericht erstellen →</button>
      </div>
    </div>
  </div>
</div>

<div id="print-area"></div>

<script>
var W='https://hasi-reparatur.hguencavdi.workers.dev';
var A='Bearer 71665';
var data=[], filter='all', curId=null;

var BADGE={
  'Neu':'b-neu','In Bearbeitung':'b-bearbeitung',
  'Teile bestellt':'b-teile','Warten auf Kunde':'b-warten',
  'Fertig':'b-fertig','Abgeholt':'b-abgeholt','Abgelehnt':'b-abgelehnt'
};

function badge(s){
  return '<span class="badge '+(BADGE[s]||'b-neu')+'">'+(s||'Neu')+'</span>';
}

async function load(){
  document.getElementById('msg').style.display='block';
  document.getElementById('tbl').style.display='none';
  try{
    var res=await fetch(W+'/api/reparatur',{headers:{Authorization:A}});
    data=await res.json();
    stats(); render();
  }catch(e){
    document.getElementById('msg').textContent='Fehler: '+e.message;
  }
}

function stats(){
  document.getElementById('st').textContent=data.length;
  document.getElementById('sn').textContent=data.filter(r=>r.status==='Neu').length;
  document.getElementById('sb').textContent=data.filter(r=>r.status==='In Bearbeitung'||r.status==='Teile bestellt'||r.status==='Warten auf Kunde').length;
  document.getElementById('sf').textContent=data.filter(r=>r.status==='Fertig').length;
}

function render(){
  var d=filter==='all'?data:data.filter(r=>r.status===filter);
  document.getElementById('msg').style.display='none';
  if(!d.length){document.getElementById('msg').textContent='Keine Aufträge.';document.getElementById('msg').style.display='block';document.getElementById('tbl').style.display='none';return;}
  document.getElementById('tbl').style.display='table';
  document.getElementById('tbody').innerHTML=d.map(r=>
    '<tr class="row" data-id="'+r.id+'">'+
    '<td><span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--hasi)">'+(r.nr||'—')+'</span></td>'+
    '<td style="color:var(--m);font-size:12px">'+(r.datum||'—')+'</td>'+
    '<td><strong>'+(r.k_name||'—')+'</strong><br><span style="font-size:11px;color:var(--m)">'+(r.k_telefon||'')+'</span></td>'+
    '<td style="font-size:12px">'+(r.geraet_typ||'—')+'<br><span style="color:var(--m)">'+(r.modell||'')+'</span></td>'+
    '<td style="font-size:12px;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(r.fehler||'—')+'</td>'+
    '<td style="font-family:'DM Mono',monospace;font-size:11px">'+(r.kostenlimit?r.kostenlimit+' €':'—')+'</td>'+
    '<td>'+badge(r.status)+'</td>'+
    '</tr>'
  ).join('');
  document.querySelectorAll('tr.row').forEach(function(tr){
    tr.addEventListener('click',function(){openModal(parseInt(tr.dataset.id));});
  });
}

function openModal(id){
  var r=data.find(x=>x.id===id);
  if(!r)return;
  curId=id;
  document.getElementById('m-nr').textContent=(r.nr||'Auftrag')+' — '+(r.k_name||'');
  document.getElementById('m-status').value=r.status||'Neu';
  document.getElementById('m-notiz').value=r.notizen||'';
  var fields=[
    ['Telefon',r.k_telefon],['E-Mail',r.k_email],
    ['Adresse',[r.k_adresse,r.k_plz_ort].filter(Boolean).join(', ')],
    ['Gerät',r.geraet_typ],['Modell',r.modell],
    ['Zustand','★'.repeat(r.zustand||0)+'☆'.repeat(5-(r.zustand||0))],
    ['Kostenlimit',r.kostenlimit?r.kostenlimit+' €':'—'],
    ['Zubehör',r.zubehoer],['Fehler',r.fehler],
    ['Schäden',r.schaeden],['Win-PW',r.win_passwort||'—'],
    ['Beschreibung',r.beschreibung],
  ];
  document.getElementById('m-info').innerHTML=fields.filter(f=>f[1]).map(f=>
    '<div class="mfield"><div class="lbl">'+f[0]+'</div><div class="val">'+f[1]+'</div></div>'
  ).join('');
  document.getElementById('modal').classList.add('open');
}

// Speichern
document.getElementById('m-save').addEventListener('click',async function(){
  var btn=this;
  btn.disabled=true; btn.textContent='Speichern...';
  try{
    var res=await fetch(W+'/api/reparatur/'+curId,{
      method:'PATCH',
      headers:{Authorization:A,'Content-Type':'application/json'},
      body:JSON.stringify({
        status:document.getElementById('m-status').value,
        notizen:document.getElementById('m-notiz').value
      })
    });
    var j=await res.json();
    if(j.ok){
      await load();
      document.getElementById('modal').classList.remove('open');
    } else { alert('Fehler: '+JSON.stringify(j)); }
  }catch(e){alert('Fehler: '+e.message);}
  btn.disabled=false; btn.textContent='💾 Speichern';
});

// PDF
document.getElementById('m-pdf').addEventListener('click',function(){
  var r=data.find(x=>x.id===curId); if(!r)return;
  var zList=(r.zubehoer||'').split(',').filter(Boolean).map(s=>'<span class="pc">'+s.trim()+'</span>').join('');
  var fList=(r.fehler||'').split(',').filter(Boolean).map(s=>'<span class="pc">'+s.trim()+'</span>').join('');
  document.getElementById('print-area').innerHTML=`
    <div class="pd">
      <div class="ph">
        <img src="./logo.jpg" alt="Hasi Elektronic">
        <div class="phr"><strong>Reparaturauftrag</strong>Nr. ${r.nr||'—'}<br>Datum: ${r.datum||'—'}<br>Status: ${r.status||'Neu'}</div>
      </div>
      <div class="ps"><div class="pst">Kunde & Gerät</div>
        <div class="pg">
          <div class="pf"><div class="pl">Kunde</div><div class="pv">${r.k_name||'—'}</div></div>
          <div class="pf"><div class="pl">Telefon</div><div class="pv">${r.k_telefon||'—'}</div></div>
          <div class="pf"><div class="pl">Adresse</div><div class="pv">${[r.k_adresse,r.k_plz_ort].filter(Boolean).join(', ')||'—'}</div></div>
          <div class="pf"><div class="pl">Gerät / Modell</div><div class="pv">${r.geraet_typ||'—'} ${r.modell||''}</div></div>
          <div class="pf"><div class="pl">Kostenlimit</div><div class="pv">${r.kostenlimit?r.kostenlimit+' €':'—'}</div></div>
          <div class="pf"><div class="pl">Win-Passwort</div><div class="pv">${r.win_passwort||'—'}</div></div>
          <div class="pf"><div class="pl">Schäden</div><div class="pv">${r.schaeden||'—'}</div></div>
        </div>
      </div>
      <div class="ps"><div class="pst">Zubehör</div><div class="pchk">${zList||'—'}</div></div>
      <div class="ps"><div class="pst">Fehler</div><div class="pchk">${fList||'—'}</div>${r.beschreibung?'<div style="font-size:9px;margin-top:4px">'+r.beschreibung+'</div>':''}</div>
      ${r.notizen?'<div class="ps"><div class="pst">Notizen</div><div style="font-size:10px">'+r.notizen+'</div></div>':''}
      <div class="psig"><div class="psig-box"><div class="psig-line">Ort, Datum</div></div><div class="psig-box"><div class="psig-line">Unterschrift Auftraggeber</div></div></div>
      <div class="pfoot">Hasi Elektronic · Grabenstr. 18 · 71665 Vaihingen/Enz · +49 7042 16391 · ${r.nr||''}</div>
    </div>`;
  window.print();
});

// Arbeitsbericht
document.getElementById('m-ab').addEventListener('click',function(){
  var r=data.find(x=>x.id===curId); if(!r)return;
  var p=new URLSearchParams({
    from_reparatur:'1',k_name:r.k_name||'',
    k_addr:[r.k_adresse,r.k_plz_ort].filter(Boolean).join(', '),
    geraet:r.geraet_typ||'',modell:r.modell||'',
    fehler:r.fehler||'',datum:r.datum||'',reparatur_nr:r.nr||''
  });
  window.open('./arbeitsbericht.html?'+p.toString(),'_blank');
});

// Kapat
document.getElementById('m-close').addEventListener('click',function(){document.getElementById('modal').classList.remove('open');});
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

// Filtreler
document.getElementById('btn-refresh').addEventListener('click',load);
document.querySelectorAll('.fbtn[data-f]').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.fbtn[data-f]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); filter=b.dataset.f; render();
  });
});

load();
</script>
</body>
</html>
